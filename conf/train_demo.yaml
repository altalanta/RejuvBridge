experiment: rejuvbridge-demo
run_name: demo-unet-contrastive
mlflow_uri: file:mlruns
outputs: outputs
amp: true
checkpointing: true
distributed:
  strategy: fsdp
  world_size: 1
  precision: bf16
data:
  shards: data/shards
  batch_size: 4
model:
  vision_backbone: unet2d
  omics_dim: 1024
  proj_dim: 256
optim:
  lr: 1e-4
  epochs: 1
